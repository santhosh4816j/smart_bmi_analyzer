name: smart_bmi_analyzer
description: "Smart BMI Analyzer by BeachWeather — an offline-first premium health companion."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management / routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # Charts & visuals
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0
  msix: ^3.16.7

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

msix_config:
  display_name: Smart BMI Analyzer by beachweather
  publisher_display_name: santhosh4816j
  identity_name: santhosh4816j.SmartBMIAnalyzerbybeachweather
  publisher: CN=56A045A8-7F10-4271-9A86-566887D6E7CD
  msix_version: 1.0.0.0
  logo_path: assets/icons/app_icon.png
  capabilities: internetClient
  languages: en-us
