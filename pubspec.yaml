name: smart_bmi_analyzer

description: "Smart BMI Analyzer by BeachWeather - a fully offline health and fitness companion."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5

  # Charts
  fl_chart: ^0.70.2

  # Fonts
  google_fonts: ^6.2.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  msix: ^3.16.9

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

msix_config:
  display_name: Smart BMI Analyzer by BeachWeather

  publisher_display_name: santhosh4816j

  identity_name: santhosh4816j.SmartBMIAnalyzerbybeachweather

  publisher: CN=56A045A8-7F10-4271-9A86-566887D6E7CD

  msix_version: 1.0.0.0

  logo_path: assets/icons/app_icon.png

  capabilities: internetClient

  languages: en-us

  certificate_path: certificate.pfx

  certificate_password: $CERTIFICATE_PASSWORD

  install_certificate: false

  build_windows: false
