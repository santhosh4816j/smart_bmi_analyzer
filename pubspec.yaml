name: Build Smart BMI Analyzer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Platform Files
        run: flutter create . --platforms=android,windows

      - name: Restore Signing Certificate
        shell: pwsh
        run: |
          [System.IO.File]::WriteAllBytes(
            "certificate.pfx",
            [System.Convert]::FromBase64String("${{ secrets.MSIX_CERTIFICATE }}")
          )

      - name: Verify Certificate
        shell: pwsh
        run: |
          if (Test-Path "certificate.pfx") {
            Write-Host "✅ certificate.pfx restored successfully."
          } else {
            Write-Error "❌ certificate.pfx not found."
            exit 1
          }

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Create MSIX Package
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: dart run msix:create

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartBMIAnalyzer-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: SmartBMIAnalyzer-AAB
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload MSIX
        uses: actions/upload-artifact@v4
        with:
          name: SmartBMIAnalyzer-MSIX
          path: build/windows/**/*.msix
